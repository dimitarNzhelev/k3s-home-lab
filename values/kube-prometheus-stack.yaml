# k3s-tuned values for kube-prometheus-stack.

# --- Control-plane scrape jobs that don't apply to single-node k3s ---
# k3s bundles controller-manager/scheduler/proxy into one process, and this is a
# single-node SQLite cluster (no etcd). The default ServiceMonitors would sit
# permanently "down" and fire alerts, so disable them. Re-enable later by
# exposing the relevant k3s metrics bind addresses.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: 18GB
    # Watch ServiceMonitors/PodMonitors/Rules in all namespaces, not only those
    # carrying this chart's release label.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

alertmanager:
  # Route all alerts to Discord (except the always-firing Watchdog). The webhook
  # URL is NOT here — it lives in the `alertmanager-discord` secret (created out
  # of band, mounted via alertmanagerSpec.secrets) and read with webhook_url_file.
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: discord
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: "null"
      - name: discord
        discord_configs:
          - webhook_url_file: /etc/alertmanager/secrets/alertmanager-discord/webhook-url
            send_resolved: true
  alertmanagerSpec:
    secrets:
      - alertmanager-discord   # mounted at /etc/alertmanager/secrets/alertmanager-discord/
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

grafana:
  # Admin credentials come from a Secret created OUT OF BAND (never in Git).
  # See README "Secrets you must create".
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    type: pvc
    storageClassName: local-path
    accessModes: ["ReadWriteOnce"]
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
