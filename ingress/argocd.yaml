apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd
  namespace: argocd
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: argo-cd-argocd-server
      port:
        number: 80
  tls:
    - hosts:
        - argocd   # -> https://argocd.tail652475.ts.net
