apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedtest-exporter
  namespace: monitoring
  labels:
    app: speedtest-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: speedtest-exporter
  template:
    metadata:
      labels:
        app: speedtest-exporter
    spec:
      containers:
        - name: speedtest-exporter
          image: ghcr.io/miguelndecarvalho/speedtest-exporter:latest
          ports:
            - name: metrics
              containerPort: 9798
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: speedtest-exporter
  namespace: monitoring
  labels:
    app: speedtest-exporter
spec:
  selector:
    app: speedtest-exporter
  ports:
    - name: metrics
      port: 9798
      targetPort: 9798
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: speedtest-exporter
  namespace: monitoring
  labels:
    app: speedtest-exporter
spec:
  selector:
    matchLabels:
      app: speedtest-exporter
  endpoints:
    - port: metrics
      # A speedtest runs on every scrape and takes ~30s, so scrape slowly.
      interval: 1h
      scrapeTimeout: 60s
