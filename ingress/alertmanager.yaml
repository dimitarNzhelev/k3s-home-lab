apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: kube-prometheus-stack-alertmanager
      port:
        number: 9093
  tls:
    - hosts:
        - alertmanager   # -> https://alertmanager.tail652475.ts.net
