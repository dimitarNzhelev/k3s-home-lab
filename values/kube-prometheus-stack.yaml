# k3s-tuned values for kube-prometheus-stack.

# --- Control-plane scrape jobs that don't apply to single-node k3s ---
# k3s bundles controller-manager/scheduler/proxy into one process, and this is a
# single-node SQLite cluster (no etcd). The default ServiceMonitors would sit
# permanently "down" and fire alerts, so disable them. Re-enable later by
# exposing the relevant k3s metrics bind addresses.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: 18GB
    # Watch ServiceMonitors/PodMonitors/Rules in all namespaces, not only those
    # carrying this chart's release label.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

alertmanager:
  # Alerts route to Discord via an AlertmanagerConfig CR
  # (manifests/monitoring-extras/discord-alertmanagerconfig.yaml) that uses
  # Discord's Slack-compatible webhook endpoint with slackConfigs.apiURL (a
  # secret ref the operator resolves — keeps the URL out of Git). The Watchdog
  # (which always fires) is dropped by the chart's default top-level route.
  # matcherStrategy lets that monitoring-namespace config match alerts from ALL
  # namespaces, not just monitoring.
  alertmanagerSpec:
    alertmanagerConfigMatcherStrategy:
      type: OnNamespaceExceptForAlertmanagerNamespace
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

grafana:
  # Admin credentials come from a Secret created OUT OF BAND (never in Git).
  # See README "Secrets you must create".
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    type: pvc
    storageClassName: local-path
    accessModes: ["ReadWriteOnce"]
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
