apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 86.2.3
      helm:
        valueFiles:
          - $values/values/kube-prometheus-stack.yaml
    - repoURL: https://github.com/dimitarNzhelev/k3s-home-lab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # kube-prometheus-stack CRDs are very large; server-side apply avoids the
      # client-side last-applied-configuration annotation size limit.
      - ServerSideApply=true
