apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustfs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.rustfs.com
      chart: rustfs
      targetRevision: 0.8.0
      helm:
        valueFiles:
          - $values/values/rustfs.yaml
    - repoURL: https://github.com/dimitarNzhelev/k3s-home-lab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: rustfs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # rustfs CRDs are very large; server-side apply avoids the
      # client-side last-applied-configuration annotation size limit.
      - ServerSideApply=true
