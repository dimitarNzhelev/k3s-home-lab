apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adguard-data
  namespace: adguard
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard
  namespace: adguard
  labels:
    app: adguard
spec:
  replicas: 1
  strategy:
    type: Recreate   # single RWO PVC
  selector:
    matchLabels:
      app: adguard
  template:
    metadata:
      labels:
        app: adguard
    spec:
      containers:
        - name: adguard
          image: adguard/adguardhome:latest
          securityContext:
            capabilities:
              add: ["NET_BIND_SERVICE"]   # bind :53
          ports:
            - name: web
              containerPort: 3000
              protocol: TCP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
          volumeMounts:
            - name: data
              mountPath: /opt/adguardhome/conf
              subPath: conf
            - name: data
              mountPath: /opt/adguardhome/work
              subPath: work
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: adguard-data
---
# Web admin UI — published over the tailnet via the Tailscale ingress below.
apiVersion: v1
kind: Service
metadata:
  name: adguard-web
  namespace: adguard
spec:
  selector:
    app: adguard
  ports:
    - name: web
      port: 3000
      targetPort: 3000
      protocol: TCP
---
# DNS service — exposed directly onto the tailnet by the Tailscale Operator so
# it can be set as the tailnet's nameserver. Becomes adguard-dns.tail652475.ts.net.
apiVersion: v1
kind: Service
metadata:
  name: adguard-dns
  namespace: adguard
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "adguard-dns"
spec:
  selector:
    app: adguard
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adguard
  namespace: adguard
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: adguard-web
      port:
        number: 3000
  tls:
    - hosts:
        - adguard   # -> https://adguard.tail652475.ts.net
