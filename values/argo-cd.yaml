# Argo CD self-managed configuration.
# TLS is terminated upstream by the Tailscale Operator (later phase), so the
# API/UI server runs in insecure (HTTP) mode internally. For now it is reached
# via `kubectl port-forward`.
configs:
  params:
    server.insecure: true
  cm:
    # External URL — Argo CD is reached at this Tailscale Operator hostname.
    url: https://argocd.tail652475.ts.net

crds:
  install: true
  keep: true
